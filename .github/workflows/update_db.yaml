# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
# Weekly Oil Bulletin Auto-Update Workflow
# Aligned with EU Thursday release schedule


on:
  workflow_dispatch:
  push:
    paths: ["**"]
  schedule:
    - cron: "30 7 * * 4"


name: UpdateDB

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get -y update && sudo apt-get install -y \
            libgit2-dev libpoppler-cpp-dev libxml2-dev libssl-dev libcurl4-openssl-dev

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Set RENV_PATHS_ROOT
        shell: bash
        run: echo "RENV_PATHS_ROOT=${{ runner.temp }}/renv" >> $GITHUB_ENV

      - name: Install and activate renv
        run: |
          install.packages("renv")
          renv::activate()
        shell: Rscript {0}

      - name: Get R and OS version
        id: get-version
        run: |
          cat("os-version=", sessionInfo()$running, "\n", file = Sys.getenv("GITHUB_OUTPUT"), sep = "", append = TRUE)
          cat("r-version=", R.Version()$version.string, "\n", file = Sys.getenv("GITHUB_OUTPUT"), sep = "", append = TRUE)
        shell: Rscript {0}

      - name: Restore Renv package cache
        uses: actions/cache@v3
        with:
          path: ${{ env.RENV_PATHS_ROOT }}
          key: ${{ steps.get-version.outputs.os-version }}-${{ steps.get-version.outputs.r-version }}-${{ hashFiles('renv.lock') }}
          restore-keys: |
            ${{ steps.get-version.outputs.os-version }}-${{ steps.get-version.outputs.r-version }}-

      - name: renv restore
        run: renv::restore()
        shell: Rscript {0}

      - name: Update DB and logs
        run: |
          source("script/update_db.R")
        shell: Rscript {0}

      # Optional if these scripts exist
      - name: Update fig
        run: |
          source("script/update_fig.R")
        shell: Rscript {0}

      - name: Update Readme
        run: |
          source("script/update_readme.R")
        shell: Rscript {0}

      - name: Commit and push changes
        run: |
          git config --local user.name "$GITHUB_ACTOR"
          git config --local user.email "$GITHUB_ACTOR@users.noreply.github.com"
          git pull --ff-only
          git add data/meta* data/db* doc/* README.md fig/*
          git commit -m "Update WOB" || echo "No changes to commit"
          git push origin
