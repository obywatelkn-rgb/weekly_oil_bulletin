name: UpdateDB

on:
  workflow_dispatch:
  push:
    paths: ["**"]
  schedule:
    - cron: "30 7 * * 4"   # Thursday 07:30 UTC (08:30 CET)

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get -y update
          sudo apt-get install -y \
            libgit2-dev libpoppler-cpp-dev libxml2-dev libssl-dev libcurl4-openssl-dev

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Set RENV_PATHS_ROOT
        shell: bash
        run: echo "RENV_PATHS_ROOT=${{ runner.temp }}/renv" >> $GITHUB_ENV

      - name: Install and activate renv (vanilla)
        shell: bash
        env:
          R_PROFILE_USER: ""
          R_ENVIRON_USER: ""
        run: |
          Rscript --vanilla -e 'install.packages("renv", repos="https://cloud.r-project.org")'
          Rscript --vanilla -e 'renv::activate()'

      - name: Get R and OS version (vanilla)
        id: get-version
        shell: bash
        env:
          R_PROFILE_USER: ""
          R_ENVIRON_USER: ""
        run: |
          Rscript --vanilla -e 'cat("os-version=", sessionInfo()$running, "\n", file=Sys.getenv("GITHUB_OUTPUT"), sep="", append=TRUE)'
          Rscript --vanilla -e 'cat("r-version=", R.Version()$version.string, "\n", file=Sys.getenv("GITHUB_OUTPUT"), sep="", append=TRUE)'

      - name: Restore renv package cache
        uses: actions/cache@v3
        with:
          path: ${{ env.RENV_PATHS_ROOT }}
          key: ${{ steps.get-version.outputs.os-version }}-${{ steps.get-version.outputs.r-version }}-${{ hashFiles('renv.lock') }}
          restore-keys: |
            ${{ steps.get-version.outputs.os-version }}-${{ steps.get-version.outputs.r-version }}-

      - name: renv restore (vanilla)
        shell: bash
        env:
          R_PROFILE_USER: ""
          R_ENVIRON_USER: ""
        run: Rscript --vanilla -e 'renv::restore()'

      # NEW STEP: Install missing scraper packages (xml2, rvest, stringr, dplyr)
      - name: Install missing R packages for WOB scraper
        shell: bash
        env:
          R_PROFILE_USER: ""
          R_ENVIRON_USER: ""
        run: |
          Rscript --vanilla -e 'renv::activate(); pkgs <- c("xml2","rvest","stringr","dplyr"); missing <- setdiff(pkgs, rownames(installed.packages())); if (length(missing)) renv::install(missing)'

      - name: Update DB and logs (vanilla)
        shell: bash
        env:
          R_PROFILE_USER: ""
          R_ENVIRON_USER: ""
        run: |
          Rscript --vanilla -e 'options(warn=1); tryCatch({
            source("script/update_wobs.R", echo=TRUE, max.deparse.length=Inf)
          }, error=function(e){
            message("---- ERROR in update script ----")
            message(conditionMessage(e))
            traceback(3)
            quit(status=1)
          })'

      - name: Update figures if script exists
        if: always()
        shell: bash
        env:
          R_PROFILE_USER: ""
          R_ENVIRON_USER: ""
        run: |
          if [ -f "script/update_fig.R" ]; then
            Rscript --vanilla -e 'source("script/update_fig.R")'
          else
            echo "No update_fig.R found — skipping."
          fi

      - name: Update Readme if script exists
        if: always()
        shell: bash
        env:
          R_PROFILE_USER: ""
          R_ENVIRON_USER: ""
        run: |
          if [ -f "script/update_readme.R" ]; then
            Rscript --vanilla -e 'source("script/update_readme.R")'
          else
            echo "No update_readme.R found — skipping."
          fi

      - name: Commit and push changes
        shell: bash
        run: |
          git config --local user.name "$GITHUB_ACTOR"
          git config --local user.email "$GITHUB_ACTOR@users.noreply.github.com"
          git pull --ff-only
          git add data/meta* data/db* doc/* README.md fig/* || true
          git commit -m "Update WOB" || echo "No changes to commit"
          git push origin
